<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mental Health Chatbot</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4a90e2">
  <style>
    body { font-family: Arial, sans-serif; background: #f4f6f8; margin: 0; padding: 0; }
    #chat { max-width: 600px; margin: auto; padding: 1rem; }
    .message { padding: 10px; margin: 5px 0; border-radius: 10px; max-width: 80%; }
    .user { background: #4a90e2; color: #fff; text-align: right; margin-left: auto; }
    .bot { background: #e0e0e0; color: #000; text-align: left; margin-right: auto; }
    input { width: 80%; padding: 10px; margin-right: 5px; }
    button { padding: 10px; }
  </style>
</head>
<body>
  <div id="chat"></div>
  <div style="text-align:center; margin-top:10px;">
    <input type="text" id="message" placeholder="Type your message..."/>
    <button onclick="sendMessage()">Send</button>
    <button onclick="startVoice()">🎤 Speak</button>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('message');

    // Display message in chat
    function appendMessage(sender, text) {
      const div = document.createElement('div');
      div.className = 'message ' + sender;
      div.innerText = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    // Send message to server
    async function sendMessage() {
      const message = input.value.trim();
      if (!message) return;
      appendMessage('user', message);
      input.value = '';

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message })
        });
        const data = await res.json();
        appendMessage('bot', data.reply);
        speak(data.reply); // Speak the bot response
      } catch(err) {
        appendMessage('bot', "❌ Server error");
      }
    }

    // Voice recognition
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = "en-US";
    function startVoice() { recognition.start(); }
    recognition.onresult = function(event) {
      const text = event.results[0][0].transcript;
      input.value = text;
      sendMessage();
    }

    // Text-to-Speech
    function speak(text) {
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = "en-US";
      window.speechSynthesis.speak(utter);
    }

    // Press Enter to send
    input.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
  </script>
</body>
</html>
