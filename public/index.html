<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Mental Health Chatbot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background:#f4f4f4; }
    #chat { max-width: 600px; margin: auto; background:white; padding:20px; border-radius:10px; height:400px; overflow-y:auto; box-shadow: 0 0 10px rgba(0,0,0,0.1);}
    .message { margin: 10px 0; padding:10px; border-radius:8px; max-width:80%; }
    .user { background:#cce5ff; color:#004085; margin-left:auto; text-align:right; }
    .bot { background:#d4edda; color:#155724; margin-right:auto; text-align:left; }
    #inputArea { max-width: 600px; margin:auto; display:flex; margin-top:10px; }
    #message { flex:1; padding:10px; border-radius:8px; border:1px solid #ccc; }
    #send { padding:10px 15px; margin-left:10px; border:none; border-radius:8px; background:#28a745; color:white; cursor:pointer; }
    #send:hover { background:#218838; }
  </style>
</head>
<body>
  <h1 style="text-align:center;">🧠 Mental Health Chatbot</h1>
  <div id="chat"></div>

  <div id="inputArea">
    <input type="text" id="message" placeholder="Type your question...">
    <button id="send">Send</button>
  </div>

  <script>
    const chat = document.getElementById("chat");
    const messageInput = document.getElementById("message");
    const sendButton = document.getElementById("send");

    async function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;
      appendMessage("user", "🗨️ " + text);
      messageInput.value = "";

      try {
        const response = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text })
        });
        const data = await response.json();
        appendMessage("bot", "🤖 " + data.reply);
      } catch (err) {
        appendMessage("bot", "❌ Server error, please try again.");
      }
    }

    function appendMessage(sender, text) {
      const div = document.createElement("div");
      div.className = "message " + sender;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    sendButton.onclick = sendMessage;
    messageInput.addEventListener("keypress", e => {
      if (e.key === "Enter") sendMessage();
    });
  </script>
</body>
</html>
